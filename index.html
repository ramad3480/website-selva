<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Semangat Selvaaa! ❤️</title>
    <style>
        body { margin: 0; background: radial-gradient(circle, #ff9a9e 0%, #fad0c4 100%); 
               height: 100vh; display: flex; flex-direction: column; align-items: center; 
               justify-content: center; font-family: 'Segoe UI', cursive; text-align: center; overflow: hidden; }
        
        .container { background: rgba(255, 255, 255, 0.9); padding: 30px; border-radius: 25px; 
                     box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 10; max-width: 85%; }
        
        /* Gaya Foto */
        .foto { width: 150px; height: 150px; border-radius: 50%; border: 5px solid #fff; 
                box-shadow: 0 4px 10px rgba(0,0,0,0.2); margin-bottom: 15px; object-fit: cover; }

        h1 { color: #d63384; font-size: 2em; margin-bottom: 10px; }
        p { color: #555; font-size: 1.2em; line-height: 1.5; }
        
        .btn { margin-top: 20px; padding: 15px 30px; border: none; border-radius: 50px; 
               background: #ff4757; color: white; font-weight: bold; cursor: pointer; 
               transition: 0.4s; font-size: 1.1em; }
        .btn:hover { background: #ff6b81; transform: scale(1.1); }

        .star { position: absolute; color: gold; font-size: 15px; animation: twinkle 1s infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.3; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.2); } }
    </style>
</head>
<body>

    <div class="container">
        <img src="selva.jpg" class="foto" alt="Selva">
        
        <h1>Hai Selva Sayanggg! ✨</h1>
        <p id="teks">Apapun yang lagi kamu kerjain sekarang, aku bangga banget sama kamu. Jangan lupa istirahat ya!!!, kamu hebat banget bisa sampai di titik ini. Semangat teruss yaa, kalo ada apa-apa cerita yaa ada aku disini sekaranggg. ❤️</p>
        <button class="btn" onclick="beriSemangat()">Klik Untuk Semangat!</button>
    </div>

    <script>
        function buatBintang() {
            const star = document.createElement('div');
            star.className = 'star';
            star.innerHTML = '✦';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 2000);
        }
        setInterval(buatBintang, 300);

        function beriSemangat() {
            document.getElementById('teks').innerHTML = "Kamu cantikk, imutt, lucuuu, gumushh pulaa ! 🌟 jangan nyerah ya, semua capek nya bakall kebayarr semuaa, Semangaattt!!! I love you, Sayanggg! ❤️";
            document.body.style.background = "linear-gradient(45deg, #f093fb 0%, #f5576c 100%)";
        }
    </script>
</body>
</html>
